<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitch Wrench</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="plugin-container size-medium" id="plugin-container">
        
        <!-- Header -->
        <div class="header">
            <div class="logo">PITCH <span class="accent">WRENCH</span></div>
            <div class="dropdown-container">
                <label for="size-selector">UI SIZE</label>
                <select id="size-selector">
                    <option value="size-small">SMALL</option>
                    <option value="size-medium" selected>MEDIUM</option>
                    <option value="size-large">LARGE</option>
                </select>
            </div>
        </div>

        <!-- Main Body -->
        <div class="main-body">
            
            <!-- Left Panel: Power -->
            <div class="panel power-panel">
                <div class="power-label">POWER</div>
                <div class="toggle-container">
                    <label class="switch">
                        <input type="checkbox" id="power-toggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="status-indicator">
                    <div class="led" id="power-led"></div>
                    <span id="power-status-text">ON</span>
                </div>
            </div>

            <!-- Center Panel: Knob -->
            <div class="panel knob-panel">
                <div class="panel-label">SEMITONES</div>
                
                <div class="knob-container">
                    <div class="tick-marks" id="tick-marks">
                        <!-- Tick marks generated by JS -->
                    </div>
                    <div class="knob-base">
                        <div class="knob-dial" id="knob-dial">
                            <div class="knob-pointer"></div>
                        </div>
                    </div>
                </div>
                
                <div class="value-display">
                    <span class="brackets">[</span>
                    <span id="semitone-value">0</span>
                    <span class="brackets">]</span>
                </div>
            </div>

            <!-- Right Panel: Decorative/Extra to balance design -->
            <div class="panel extra-panel">
                <!-- Keep empty for flat minimal design or add logo -->
                <div class="wrench-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                    </svg>
                </div>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

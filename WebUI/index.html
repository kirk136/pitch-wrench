<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitch Wrench</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="plugin-shell" id="plugin-shell">

  <!-- ── Header ──────────────────────────────────────────────────── -->
  <header class="header">
    <div class="logo">
      <span class="logo-pitch">PITCH</span>
      <span class="logo-wrench">WRENCH</span>
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77
                 a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91
                 a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>
    <div class="header-right">
      <img src="logo.png" alt="Pulverine Audio" class="company-logo">
      <div class="size-control">
        <label for="size-select" class="size-label">SIZE</label>
        <select id="size-select" class="size-select">
          <option value="0">SMALL</option>
          <option value="1" selected>MEDIUM</option>
          <option value="2">LARGE</option>
        </select>
      </div>
    </div>
  </header>

  <!-- ── Main panel ─────────────────────────────────────────────── -->
  <main class="main-panel">

    <!-- Power section -->
    <section class="power-section">
      <div class="power-label">PWR</div>
      <button class="power-btn active" id="power-btn" aria-label="Power">
        <span class="power-ring"></span>
        <svg class="power-icon" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
          <line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
      </button>
      <div class="led-container">
        <div class="led active" id="power-led"></div>
        <span class="led-label" id="power-text">ON</span>
      </div>
    </section>

    <!-- Knob section -->
    <section class="knob-section">
      <div class="knob-label">SEMITONES</div>

      <div class="knob-rig" id="knob-rig">
        <!-- Tick ring (generated by JS) -->
        <canvas class="tick-canvas" id="tick-canvas"></canvas>

        <!-- Outer ring (grip texture) -->
        <div class="knob-outer">
          <div class="knob-inner" id="knob-dial">
            <div class="knob-marker"></div>
          </div>
        </div>
      </div>

      <div class="value-display">
        <span class="val-bracket">[</span>
        <span class="val-number" id="val-number">0</span>
        <span class="val-unit">st</span>
        <span class="val-bracket">]</span>
      </div>
    </section>

    <!-- Right section: Fine-tune & Mix -->
    <section class="right-section">
      <div class="small-knobs-container">
        <!-- Fine-tune -->
        <div class="small-knob-group">
          <div class="small-knob-label">FINE TUNE</div>
          <div class="small-knob-rig" id="finetune-rig">
            <div class="small-knob-outer">
              <div class="small-knob-inner" id="finetune-dial">
                <div class="small-knob-marker"></div>
              </div>
            </div>
          </div>
          <div class="small-val-display" id="finetune-val">0 ct</div>
        </div>

        <!-- Mix -->
        <div class="small-knob-group">
          <div class="small-knob-label">MIX</div>
          <div class="small-knob-rig" id="mix-rig">
            <div class="small-knob-outer">
              <div class="small-knob-inner" id="mix-dial">
                <div class="small-knob-marker"></div>
              </div>
            </div>
          </div>
          <div class="small-val-display" id="mix-val">100 %</div>
        </div>
      </div>
      <div class="version-tag">v1.1</div>
    </section>

  </main>

  <!-- ── Footer strip ───────────────────────────────────────────── -->
  <footer class="footer">
    <div class="footer-range">-24</div>
    <div class="footer-center">PITCH SHIFT</div>
    <div class="footer-range">+24</div>
  </footer>

</div>

<script src="app.js"></script>
</body>
</html>
